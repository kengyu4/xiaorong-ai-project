server:
  port: 8088

spring:
  config:
    import: optional:file:./src/main/resources/application-secret.yml
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

xiaorong:
  cache:
    enabled: true
    prefix: "xiaorong:"
    ttl-seconds: 3600
  auth:
    enabled: true
    token-ttl-seconds: 86400
    bcrypt-strength: 12
  rabbitmq:
    lesson-material-exchange: xiaorong.ai.direct
    lesson-material-queue: xiaorong.ai.lesson-material.generate
    lesson-material-routing-key: GENERATE_LESSON_MATERIAL
  mock-user-id: 10001
  prompt-version: lesson-v1
  study:
    template-path: ../interactive-quiz-demo/后端题目固定互动模版（小绒老师+白子同桌）.md
  persistence:
    enabled: true
    seed-on-startup: true
    jdbc-url: jdbc:mysql://localhost:3306/xiaorong_teacher?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  ai:
    real-enabled: true
    default-provider-code: bailian
    providers:
      - provider-code: deepseek
        provider-name: DeepSeek
        protocol: openai-compatible
        base-url: https://api.deepseek.com/v1
        api-key: ${DEEPSEEK_API_KEY:}
        default-model: deepseek-chat
        support-stream: true
        support-json: true
        priority: 20
        enabled: false
      - provider-code: bailian
        provider-name: 阿里百炼
        protocol: openai-compatible
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        api-key: ${BAILIAN_API_KEY:${DASHSCOPE_API_KEY:}}
        default-model: qwen-plus
        support-stream: true
        support-json: true
        priority: 10
        enabled: true
      - provider-code: oneapi
        provider-name: OneAPI
        protocol: openai-compatible
        base-url: http://localhost:3000/v1
        api-key: ${ONEAPI_API_KEY:}
        default-model: gpt-4o-mini
        support-stream: true
        support-json: true
        priority: 30
        enabled: false

logging:
  level:
    root: info
