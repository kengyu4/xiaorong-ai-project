spring.application.name=xiaorong-service-study
spring.profiles.active=dev
spring.main.allow-bean-definition-overriding=true
spring.cloud.nacos.discovery.enabled=${SPRING_CLOUD_NACOS_DISCOVERY_ENABLED:false}
spring.cloud.nacos.config.enabled=${SPRING_CLOUD_NACOS_CONFIG_ENABLED:false}
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848
spring.cloud.nacos.config.server-addr=127.0.0.1:8848
spring.cloud.nacos.config.prefix=${spring.application.name}
spring.cloud.nacos.config.file-extension=yaml
spring.cloud.nacos.config.group=XIAORONG_TEACHER
spring.cloud.compatibility-verifier.enabled=false
spring.cloud.nacos.config.shared-configs[0].data-id=common-config.yaml
spring.cloud.nacos.config.shared-configs[0].group=XIAORONG_TEACHER
spring.cloud.nacos.config.shared-configs[0].refresh=true

